<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentCal — Calendario de Contenidos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  /* RESTAURADA LA ESTÉTICA ORIGINAL */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F5F2; --surface: #FFFFFF; --surface-2: #F0EDE8; --border: #E5E0D8; --border-dark: #CEC8BE;
    --text: #1C1917; --text-2: #6B6560; --text-3: #A09890; --accent: #5B4FFF; --accent-light: #EEECff;
    --accent-hover: #4740E0; --ad-color: #E05B2B; --ad-bg: #FEF1EC; --ad-border: #F4A882;
    --pub-color: #1D7D4F; --pub-bg: #E6F5ED; --pub-border: #7EC8A0; --sched-color: #8B5E0A;
    --sched-bg: #FDF4E3; --sched-border: #DEB96A; --draft-color: #5C5752; --draft-bg: #F0EDE8;
    --draft-border: #C8C3BA; --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px; --radius-xl: 20px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
    --shadow-lg: 0 12px 32px rgba(0,0,0,.12), 0 4px 8px rgba(0,0,0,.06);
    --font: 'Outfit', sans-serif; --font-logo: 'Syne', sans-serif;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  .shell { max-width: 1080px; margin: 0 auto; padding: 24px 20px 40px; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo { font-family: var(--font-logo); font-size: 20px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .divider { width: 1px; height: 20px; background: var(--border-dark); }
  
  /* SELECTOR DE CLIENTES[cite: 1] */
  .client-select { font-family: var(--font); font-size: 13px; font-weight: 500; border: 1.5px solid var(--border); border-radius: var(--radius-md); padding: 8px 12px; background: var(--surface); color: var(--text); cursor: pointer; box-shadow: var(--shadow-sm); transition: all 0.15s; outline: none; min-width: 160px; display: inline-flex; align-items: center; gap: 8px; position: relative; }
  .client-dropdown { display: none; position: absolute; top: 100%; left: 0; right: 0; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-md); margin-top: 4px; box-shadow: var(--shadow-lg); z-index: 100; max-height: 200px; overflow-y: auto; }
  .client-dropdown.show { display: block; }
  .client-option { padding: 10px 12px; cursor: pointer; font-size: 13px; color: var(--text); transition: background 0.1s; border-bottom: 1px solid var(--border); }
  .client-option:hover { background: var(--surface-2); }
  .client-option.add-new { color: var(--accent); font-weight: 600; border-top: 1.5px solid var(--border); }

  /* NAVEGACIÓN Y BOTONES[cite: 1] */
  .nav-wrap { display: flex; gap: 4px; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-lg); padding: 5px; margin-bottom: 20px; box-shadow: var(--shadow-sm); width: fit-content; }
  .nav-btn { font-family: var(--font); font-size: 13px; font-weight: 500; padding: 7px 18px; border: none; border-radius: var(--radius-md); background: transparent; color: var(--text-2); cursor: pointer; transition: all 0.18s; }
  .nav-btn.active { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(91,79,255,.35); }
  .share-btn { font-family: var(--font); font-size: 12px; font-weight: 500; padding: 7px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-md); background: var(--surface); color: var(--text-2); cursor: pointer; box-shadow: var(--shadow-sm); transition: all 0.15s; }
  .add-btn { font-family: var(--font); font-size: 13px; font-weight: 600; padding: 8px 16px; border: none; border-radius: var(--radius-md); background: var(--accent); color: #fff; cursor: pointer; box-shadow: 0 2px 8px rgba(91,79,255,.35); transition: all 0.18s; display: flex; align-items: center; gap: 6px; }

  /* GRID Y MODALES[cite: 1] */
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: var(--border); border: 1.5px solid var(--border); border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow-md); }
  .cal-day { background: var(--surface); padding: 8px; min-height: 96px; cursor: pointer; transition: background 0.12s; position: relative; }
  .post-pill { font-size: 10px; font-weight: 500; padding: 3px 6px; border-radius: 5px; margin-bottom: 3px; cursor: pointer; display: flex; align-items: center; gap: 4px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 100%; border: 1px solid transparent; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(20,18,16,0.5); backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius-xl); border: 1.5px solid var(--border); width: 500px; max-width: 100%; max-height: 90vh; overflow-y: auto; padding: 24px; animation: slideUp 0.22s ease; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .preview-img { width: 64px; height: 64px; object-fit: cover; border-radius: var(--radius-md); border: 1.5px solid var(--border); margin-right: 8px; }
</style>
</head>
<body>

<div class="shell">
  <div class="header">
    <div class="header-left">
      <div class="logo">Content<span>Cal</span></div>
      <div class="divider"></div>
      <div style="display:flex;gap:6px;align-items:center;position:relative">
        <!-- SELECTOR DE CLIENTE (CM)[cite: 1] -->
        <div class="client-select" id="clientSel" onclick="toggleClientDropdown()">
          <span id="activeClientName">Café Morado</span>
          <span style="font-size:12px">▼</span>
          <div class="client-dropdown" id="clientDropdown"></div>
        </div>
        <button class="share-btn" style="padding:7px 10px" onclick="deleteCMClient()">✕</button>
      </div>
    </div>
    <button class="share-btn" id="shareBtn" onclick="generateShareLink()">↗ Compartir vista</button>
  </div>

  <div class="nav-wrap">
    <button class="nav-btn active" onclick="switchView('calendar', this)">Calendario</button>
    <button class="nav-btn" onclick="switchView('prospects', this)">💬 Prospectos</button>
    <button class="nav-btn" onclick="switchView('stats', this)">📊 Estadísticas</button>
  </div>

  <div id="mainContent"></div>
</div>

<!-- MODAL PUBLICACIÓN[cite: 1] -->
<div class="modal-overlay" id="modalPost">
  <div class="modal">
    <h3 style="margin-bottom:20px" id="modalTitle">Nueva publicación</h3>
    <div style="display:flex; flex-direction:column; gap:15px">
        <input type="text" id="postTitle" class="field-input" placeholder="Título de la publicación" style="width:100%; padding:10px; border-radius:8px; border:1.5px solid var(--border)">
        <textarea id="postCaption" rows="4" placeholder="Contenido..." style="width:100%; padding:10px; border-radius:8px; border:1.5px solid var(--border); font-family:inherit"></textarea>
        
        <div>
            <span style="font-size:12px; font-weight:600; color:var(--text-2)">ARCHIVOS</span>
            <input type="file" id="fileInput" multiple style="margin-top:5px" onchange="handleFileUpload(this)">
            <div id="previewImgs" style="display:flex; flex-wrap:wrap; margin-top:10px"></div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
            <input type="number" id="statReach" placeholder="Alcance" style="padding:10px; border-radius:8px; border:1.5px solid var(--border)">
            <input type="number" id="statInquiries" placeholder="Consultas" style="padding:10px; border-radius:8px; border:1.5px solid var(--border)">
        </div>
    </div>

    <div style="display:flex; justify-content: space-between; margin-top:20px">
      <button class="add-btn" style="background:#C0392B" onclick="deletePost()">Eliminar</button>
      <div style="display:flex; gap:10px">
        <button class="share-btn" onclick="closePostModal()">Cancelar</button>
        <button class="add-btn" id="savePostBtn" onclick="savePost()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL AGREGAR CLIENTE CM -->
<div class="modal-overlay" id="modalAddClient">
  <div class="modal" style="width:380px">
    <h3 style="margin-bottom:15px">Nuevo Cliente de CM</h3>
    <input type="text" id="newCMName" placeholder="Nombre de la marca" style="width:100%; padding:10px; border-radius:8px; border:1.5px solid var(--border)">
    <div style="display:flex; gap:10px; margin-top:20px; justify-content: flex-end">
        <button class="share-btn" onclick="closeAddClientModal()">Cancelar</button>
        <button class="add-btn" onclick="saveNewCMClient()">Agregar</button>
    </div>
  </div>
</div>

<script>
let state = JSON.parse(localStorage.getItem('contentcal_v3')) || {
    clients: ['Café Morado'],
    activeClient: 'Café Morado',
    posts: {},
    prospects: []
};

let isSharedView = false;
let uploadedFiles = [];
let editingIdx = -1;

function init() {
    const params = new URLSearchParams(window.location.search);
    if(params.has('view')) {
        isSharedView = true;
        state.activeClient = params.get('client');
        applySharedRestrictions();
    }
    renderClientDropdown();
    renderView();
}

function saveState() {
    localStorage.setItem('contentcal_v3', JSON.stringify(state));
}

// GESTIÓN DE CLIENTES CM (ELIMINAR Y AGREGAR)[cite: 1]
function renderClientDropdown() {
    const dd = document.getElementById('clientDropdown');
    document.getElementById('activeClientName').innerText = state.activeClient;
    
    let html = state.clients.map(c => `
        <div class="client-option" onclick="selectClient('${c}')">${c}</div>
    `).join('');
    
    html += `<div class="client-option add-new" onclick="openAddClientModal()">+ Agregar Cliente CM</div>`;
    dd.innerHTML = html;
}

function selectClient(name) {
    state.activeClient = name;
    saveState();
    renderClientDropdown();
    renderView();
}

function openAddClientModal() { document.getElementById('modalAddClient').classList.add('open'); }
function closeAddClientModal() { document.getElementById('modalAddClient').classList.remove('open'); }

function saveNewCMClient() {
    const name = document.getElementById('newCMName').value.trim();
    if(!name) return;
    state.clients.push(name);
    state.activeClient = name;
    state.posts[name] = [];
    saveState();
    closeAddClientModal();
    renderClientDropdown();
    renderView();
}

function deleteCMClient() {
    if(state.clients.length <= 1) return alert("Debes tener al menos un cliente.");
    if(!confirm(`¿Borrar DEFINITIVAMENTE a ${state.activeClient}?`)) return;
    
    state.clients = state.clients.filter(c => c !== state.activeClient);
    delete state.posts[state.activeClient];
    state.activeClient = state.clients[0];
    saveState();
    renderClientDropdown();
    renderView();
}

function toggleClientDropdown() {
    if(!isSharedView) document.getElementById('clientDropdown').classList.toggle('show');
}

// GESTIÓN DE ARCHIVOS Y PUBLICACIONES[cite: 1]
function handleFileUpload(input) {
    Array.from(input.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = (e) => {
            uploadedFiles.push({ src: e.target.result, type: file.type });
            renderFilePreviews();
        };
        reader.readAsDataURL(file);
    });
}

function renderFilePreviews() {
    const container = document.getElementById('previewImgs');
    container.innerHTML = uploadedFiles.map(f => `
        <img src="${f.src}" class="preview-img">
    `).join('');
}

function openPostModal(idx = -1) {
    editingIdx = idx;
    uploadedFiles = [];
    document.getElementById('previewImgs').innerHTML = '';
    
    const clientPosts = state.posts[state.activeClient] || [];
    
    if(idx >= 0) {
        const p = clientPosts[idx];
        document.getElementById('postTitle').value = p.title || '';
        document.getElementById('postCaption').value = p.caption || '';
        document.getElementById('statReach').value = p.reach || '';
        document.getElementById('statInquiries').value = p.inquiries || '';
        uploadedFiles = p.files || [];
        renderFilePreviews();
    } else {
        document.getElementById('postTitle').value = '';
        document.getElementById('postCaption').value = '';
    }

    if(isSharedView) {
        document.getElementById('savePostBtn').style.display = 'none';
        document.getElementById('fileInput').style.display = 'none';
        document.querySelectorAll('#modalPost input, #modalPost textarea').forEach(el => el.readOnly = true);
    }

    document.getElementById('modalPost').classList.add('open');
}

function savePost() {
    const p = {
        title: document.getElementById('postTitle').value,
        caption: document.getElementById('postCaption').value,
        reach: document.getElementById('statReach').value,
        inquiries: document.getElementById('statInquiries').value,
        files: uploadedFiles
    };

    if(!state.posts[state.activeClient]) state.posts[state.activeClient] = [];
    if(editingIdx >= 0) state.posts[state.activeClient][editingIdx] = p;
    else state.posts[state.activeClient].push(p);

    saveState();
    closePostModal();
    renderView();
}

function closePostModal() { document.getElementById('modalPost').classList.remove('open'); }

function renderView(view = 'calendar') {
    const mc = document.getElementById('mainContent');
    const clientPosts = state.posts[state.activeClient] || [];

    if(view === 'calendar') {
        let html = `<div class="cal-grid">`;
        for(let i=1; i<=28; i++) {
            html += `<div class="cal-day" onclick="openPostModal(-1)">
                <div style="font-size:10px; color:var(--text-3)">${i}</div>`;
            clientPosts.forEach((p, idx) => {
                html += `<div class="post-pill" style="background:var(--accent-light); color:var(--accent)" onclick="event.stopPropagation(); openPostModal(${idx})">📄 ${p.title}</div>`;
            });
            html += `</div>`;
        }
        mc.innerHTML = html + `</div>`;
    }

    if(view === 'prospects') {
        mc.innerHTML = `<h3>Prospectos Potenciales</h3><br><button class="add-btn" onclick="exportCSV()">Exportar Excel (CSV)</button>`;
    }
}

function applySharedRestrictions() {
    document.getElementById('shareBtn').style.display = 'none';
    document.getElementById('clientSel').style.pointerEvents = 'none';
    document.getElementById('clientSel').style.opacity = '0.7';
}

function generateShareLink() {
    const url = window.location.href.split('?')[0] + `?view=client&client=${encodeURIComponent(state.activeClient)}`;
    prompt("Link para tu cliente (Solo lectura):", url);
}

function exportCSV() {
    let csv = "Título,Alcance,Consultas\n";
    (state.posts[state.activeClient] || []).forEach(p => {
        csv += `"${p.title}","${p.reach}","${p.inquiries}"\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `reporte_${state.activeClient}.csv`;
    link.click();
}

init();
</script>
</body>
</html>
